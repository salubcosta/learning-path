<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas</title>
</head>
<body>
    <h1>Tarefas</h1>

    <ul>
        {% for tarefa in tarefas %}
        <li>
            <strong>{{ tarefa.titulo }}</strong> -
            {% if tarefa.finalizado %}
                Finalizado ✅
            {% else %}
                Pendente 🟡
            {% endif %}
        </li>
        {% empty %}
        <li>Nenhuma tarefa cadastrada.</li>
        {% endfor %}
    </ul>
</body>
</html>
