<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformacao</title>
    <style>
        body{
            background-color: #000;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .box {
            width: 200px;
            height: 200px;
            background-color: white;
            transition: all 2s;    
            
            align-self: center;
        }
        .box:hover{
            /* transform: rotate(180deg); */
            /* transform: skew(25deg); */
            /* transform: scale(1.5); */
            /* transform: translateX(50px); */
            /* transform: translateY(-100px); */
            transform: translate(0, -100px);
        }
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
